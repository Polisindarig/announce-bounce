# MEXC 5m klines for announcement windows — use when 1m is missing but 5m is available
# (empirically from June 2025 onward on public v3 for many pairs).
# See src/scraper/mexc_klines.py

venue: mexc

catalogs:
  - new_cryptocurrency_listing

interval: 5m

# Only announcements with published_at >= this instant (UTC). No upper bound by default.
published_after: "2025-06-01T00:00:00+00:00"
# Optional cap, e.g. end of June only:
# published_before: "2025-06-30T23:59:59+00:00"

pre_hours: 2.0
post_hours: 26.0

output_dir: data/raw/mexc_klines_5m_from_2025-06

sleep_between_symbols_s: 0.35
